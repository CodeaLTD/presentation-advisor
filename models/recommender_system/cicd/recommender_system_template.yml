name: Recommender System CI/CD

on:
  push:
    paths:
      - 'models/recommender_system/**'
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: models/recommender_system

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Compose
        run: docker-compose -f docker-compose.yml up -d --build

      - name: Wait for services
        run: |
          echo "Waiting for TensorFlow Serving to start..."
          sleep 10
          curl -f http://localhost:8501/v1/models/recommender_model || exit 1

      - name: Push Docker Image (optional, if customized Dockerfile used)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag tensorflow/serving your-dockerhub-username/recommender-serving:latest
          docker push your-dockerhub-username/recommender-serving:latest

      - name: Notify Success
        run: echo "✅ Deployment complete"

      - name: Rollback on Failure
        if: failure()
        run: |
          echo "❌ Rolling back to previous version"
          docker-compose -f docker-compose.yml down
          docker run -d -p 8501:8501 your-dockerhub-username/recommender-serving:previous
